<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Heatmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/drawer.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 class="title">
        <span class="icon">🏆</span>
        WORLD CUP HEATMAP
      </h1>
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search country...">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="map-container" class="map-container">
      <div id="map" class="map"></div>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-content">
      <span>Data Source: FIFA Official Records</span>
      <span>1930-2026</span>
      <span>80+ Nations</span>
    </div>
  </footer>

  <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()">
    <div id="drawer" class="drawer" onclick="event.stopPropagation()">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <div id="drawer-content" class="drawer-content">
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/world-map-geojson@1.0.2/umd/world-map-geojson.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/drawer.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
