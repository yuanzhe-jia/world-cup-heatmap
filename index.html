<body>
  <header class="header">
    <div class="header-content">
      <h1 class="title">
        World Cup Heatmap
      </h1>
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search country...">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="map-container" class="map-container">
      <div id="map" class="map" role="img" aria-label="World Cup participation heatmap showing 80+ nations from 1930 to 2026"></div>
      <noscript>
        <div style="padding: 2rem; color: #A0A0B0; text-align: center;">
          <h2>World Cup Heatmap (1930-2026)</h2>
          <p>This interactive visualization shows the FIFA World Cup participation history of over 80 nations from 1930 to 2026. The heatmap uses color intensity to represent each country's World Cup appearances, titles won, and tournament history. Click on any country to view detailed participation records including first appearance, last appearance, total appearances, and championships. Data source: FIFA Official Records.</p>
        </div>
      </noscript>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-content">
      <span>Data Source: FIFA Official Records</span>
      <span>1930-2026</span>
      <span>80+ Nations</span>
    </div>
  </footer>

  <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()">
    <div id="drawer" class="drawer" onclick="event.stopPropagation()">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <div id="drawer-content" class="drawer-content">
      </div>
    </div>
  </div>
